services:
    laravel.test:
        build:
            context: .
            dockerfile: docker/Dockerfile
        ports:
            - '8080:80'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
    queue-worker:
        build:
            context: .
            dockerfile: docker/Dockerfile
        command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
        restart: unless-stopped
    mysql:

        image: 'mysql:8.4'
        ports:
            - '3307:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 'password'
            MYSQL_DATABASE: 'dashboard'
            MYSQL_USER: 'sail'
            MYSQL_PASSWORD: 'password'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-ppassword"]
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
